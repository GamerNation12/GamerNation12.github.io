<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
    />
    <title>status</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn.discordapp.com/avatars/821763511281123444/6b6f2076e121f860fd540729ec91171c.webp?size=80"
    />
    <meta name="description" content="loerex" />
    <meta name="keywords" content="loerex" />
    <meta content="minecraft gamer nations website" property="og:title" />
    <meta content="find out about me!" property="og:description" />
    <meta content="find out about me!" property="og:url" />
    <meta name="theme-color" content="#ff8400" />
  </head>

  <body>
    <div id="container">
      <div class="clockContainer">
        <div class="clockTimezone"></div>
        <div class="clock"></div>
      </div>
      <div class="center">
        <p class="nameMain">
          <span id="nameNeksio" class="nameNeksio"></span>
        </p>
        <div class="gap"></div>
        <div
          class="panel discordPanel"
          style="
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 1.2em;
            background: #23272a;
            padding: 1.2em 1.5em;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.2em auto;
            box-sizing: border-box;
          "
        >
          <!-- Avatar + status dot -->
          <div style="position: relative; min-width: 80px">
            <a
              id="avatarLink"
              target="_blank"
              href="https://discord.com/users/759433582107426816"
            >
              <img
                class="discordAvatar"
                id="discordAvatar"
                src="https://cdn.discordapp.com/embed/avatars/0.png"
                alt="Discord Avatar"
                style="
                  width: 80px;
                  height: 80px;
                  border-radius: 50%;
                  border: 3px solid #5865f2;
                  object-fit: cover;
                  background: #23272a;
                  box-shadow: 0 2px 12px #0004;
                "
              />
              <!-- Status indicator with tooltip -->
              <span
                id="discordStatusDot"
                style="
                  position: absolute;
                  bottom: 10px;
                  right: 10px;
                  width: 18px;
                  height: 18px;
                  background: #747f8d;
                  border: 3px solid #23272a;
                  border-radius: 50%;
                  display: block;
                  z-index: 2;
                  cursor: pointer;
                "
                title=""
              ></span>
            </a>
          </div>
          <!-- Username, Discord icon, custom status, and social icons -->
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: flex-start;
              justify-content: center;
              flex: 1;
            "
          >
            <div style="display: flex; align-items: center; gap: 0.5em">
              <i
                class="fa-brands fa-discord"
                style="color: #5865f2; font-size: 1.4em"
              ></i>
              <span
                class="discordName"
                id="discordName"
                style="color: #fff; font-weight: bold; font-size: 1.2em"
                >Loading...</span
              >
            </div>
            <span
              id="discordCustomStatus"
              style="
                color: #b9bbbe;
                font-size: 1em;
                margin-top: 0.2em;
                max-width: 220px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
              "
            ></span>
            <!-- Social icons under username -->
            <ul
              class="social-icons list-unstyled list-inline"
              style="
                display: flex;
                gap: 1em;
                align-items: center;
                justify-content: flex-start;
                margin: 0.7em 0 0 0;
                padding: 0;
              "
            >
              <li style="list-style: none">
                <a
                  target="_blank"
                  href="https://www.youtube.com/c/MinecraftGamerNation0"
                  ><i
                    class="fa-brands fa-youtube"
                    style="color: #ff0033; font-size: 1.5em"
                  ></i
                ></a>
              </li>
              <li style="list-style: none">
                <a
                  target="_blank"
                  href="https://www.roblox.com/users/3380857326/profile"
                  ><i
                    class="fa-solid fa-gamepad"
                    style="color: #ffffff; font-size: 1.3em"
                  ></i
                ></a>
              </li>
              <li style="list-style: none">
                <a target="_blank" href="mailto:Minecraft-Gamer-Nation@post.com"
                  ><i
                    class="fa-solid fa-envelope"
                    style="color: #ffffff; font-size: 1.3em"
                  ></i
                ></a>
              </li>
            </ul>
          </div>
        </div>
        <div class="gap"></div>
        <div class="panel spotifyPanel">
          <i class="spotify fa-brands fa-spotify"></i>
          <a
            id="trackLink"
            target="_blank"
            href="gamernation12.github.io/status"
            ><img class="trackImg" id="trackImg" src="null"
          /></a>
          <p class="trackName" id="trackName">Nothing</p>
          <p class="trackArtist" id="trackArtist">
            I'm not currently listening anything
          </p>
        </div>
        <div class="gap"></div>
        <div id="rpcPanel" class="panel rpcPanel">
          <i class="game fa-solid fa-gamepad"></i>
          <img class="rpcIcon" id="rpcIcon" src="game.png" />
          <p class="rpcName" id="rpcName">None</p>
          <p class="rpcDetails" id="rpcDetails">
            I'm not currently playing anything
          </p>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
    <script>
      const gradients = [
        "#004ef7, #0084ff",
        "#ff8400, #ffc900",
        "#660acf, #ac00cf",
      ];
      const chosenGradient =
        gradients[Math.floor(Math.random() * gradients.length)];
      const nameNeksio = document.getElementById("nameNeksio");
      nameNeksio.style.backgroundImage = `linear-gradient(to right, ${chosenGradient})`;
    </script>
  </body>
</html>
